<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sukuna vs Mahoraga Arena</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>Sukuna vs Mahoraga</h1>
      <p class="subtitle">Goofy 2D battle arena sim (randomized winner each run)</p>

      <section class="arena-shell">
        <canvas id="arena" width="900" height="560"></canvas>
      </section>

      <section class="hud">
        <div class="hp"><strong>Sukuna:</strong> <span id="hp-sukuna">1000</span></div>
        <div class="hp"><strong>Mahoraga:</strong> <span id="hp-mahoraga">1000</span></div>
        <div id="status">Fight started.</div>
        <button id="restart">Run New Battle</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
